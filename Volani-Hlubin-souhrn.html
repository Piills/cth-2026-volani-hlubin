const ITER = 200000;
const SK = "vh_pw";

function b64ToBytes(b64){ const bin = atob(b64); const u = new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; }

async function decrypt(pw){
  const raw = b64ToBytes(PAYLOAD);
  const salt = raw.slice(0,16), iv = raw.slice(16,28), data = raw.slice(28);
  const pwKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations: ITER, hash:"SHA-256" },
    pwKey, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, data);
  return new TextDecoder("utf-8").decode(pt);
}

function render(html){
  document.open(); document.write(html); document.close();
}

async function tryPw(pw, fromStore){
  try {
    const html = await decrypt(pw);
    try { sessionStorage.setItem(SK, pw); } catch(e){}
    render(html);
    return true;
  } catch(e){
    if (fromStore) { try { sessionStorage.removeItem(SK); } catch(_){} }
    return false;
  }
}

document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const err = document.getElementById("err");
  err.textContent = "";
  const ok = await tryPw(document.getElementById("pw").value, false);
  if (!ok) { err.textContent = "Špatné heslo."; document.getElementById("pw").select(); }
});

(async () => {
  let saved = null;
  try { saved = sessionStorage.getItem(SK); } catch(e){}
  if (saved) { await tryPw(saved, true); }
})();
